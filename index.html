/* ============ 鱷魚女大冒險 世界 1-1 ============ */
"use strict";
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
const W = cvs.width, H = cvs.height;
const T = 32;                      // tile size
const ROWS = H / T;                // 15
const GROUND_ROW = 13;             // top row of ground
const LEVEL_W = 215;               // tiles

/* ---------- sprites ---------- */
const IMGS = {};
let imgsToLoad = 0, imgsLoaded = 0;
for (const k in SPRITE_DATA) {
  IMGS[k] = SPRITE_DATA[k].map(src => {
    imgsToLoad++;
    const im = new Image();
    im.onload = () => imgsLoaded++;
    im.src = src;
    return im;
  });
}

/* ---------- audio ---------- */
let AC = null;
function audio() { if (!AC) { try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } return AC; }
function beep(freq, dur, type="square", vol=0.12, slide=0, when=0) {
  const ac = audio(); if (!ac) return;
  const t0 = ac.currentTime + when;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq+slide), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g).connect(ac.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
const sfx = {
  jump:  () => beep(280, .22, "square", .10, 320),
  coin:  () => { beep(988,.08,"square",.10); beep(1319,.25,"square",.10,0,.08); },
  bump:  () => beep(120, .12, "square", .12, -40),
  stomp: () => beep(220, .15, "triangle", .15, -160),
  die:   () => { [392,330,262,196].forEach((f,i)=>beep(f,.18,"square",.12,0,i*.14)); },
  boom:  () => { const ac=audio(); if(!ac) return;
    const n=ac.createBufferSource(), buf=ac.createBuffer(1,ac.sampleRate*.5,ac.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2);
    const g=ac.createGain(); g.gain.value=.16; n.buffer=buf; n.connect(g).connect(ac.destination); n.start(); },
  fanfare: () => { [523,659,784,1047,784,1047,1319].forEach((f,i)=>beep(f,.22,"square",.11,0,i*.13)); }
};

/* ---------- input ---------- */
const keys = {};
let started = false;
function press(code, v) {
  keys[code] = v;
  if (v && !started && imgsLoaded >= imgsToLoad) { started = true; audio(); }
}
addEventListener("keydown", e => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
  press(e.code, true);
});
addEventListener("keyup", e => press(e.code, false));
function bindBtn(id, codes) {
  const el = document.getElementById(id);
  const on  = e => { e.preventDefault(); codes.forEach(c=>press(c,true)); };
  const off = e => { e.preventDefault(); codes.forEach(c=>press(c,false)); };
  el.addEventListener("pointerdown", on);
  el.addEventListener("pointerup", off);
  el.addEventListener("pointercancel", off);
  el.addEventListener("pointerleave", off);
}
bindBtn("btnL", ["ArrowLeft"]); bindBtn("btnR", ["ArrowRight"]); bindBtn("btnJ", ["Space"]);
cvs.addEventListener("pointerdown", () => { if (!started && imgsLoaded>=imgsToLoad) { started = true; audio(); } });

const left  = () => keys.ArrowLeft || keys.KeyA;
const right = () => keys.ArrowRight || keys.KeyD;
const jumpK = () => keys.Space || keys.ArrowUp || keys.KeyW;

/* ---------- level ---------- */
// grid values: 0 empty, 1 ground, 2 brick, 3 ?block, 4 used block, 5 solid stair block, 6 pipe body(solid)
const grid = [];
for (let r = 0; r < ROWS; r++) grid.push(new Array(LEVEL_W).fill(0));

const GAPS = new Set([69,70, 86,87,88, 153,154]);
for (let c = 0; c < LEVEL_W; c++) {
  if (c >= 200 && c < LEVEL_W) { grid[GROUND_ROW][c] = 1; grid[GROUND_ROW+1][c] = 1; continue; }
  if (!GAPS.has(c)) { grid[GROUND_ROW][c] = 1; grid[GROUND_ROW+1][c] = 1; }
}
function B(c,r){ grid[r][c]=2; }
function Q(c,r,content){ grid[r][c]=3; qContent[r*LEVEL_W+c]=content||"coin"; }
const qContent = {};
const LOW=9, HIGH=5;
Q(16,LOW);
B(20,LOW); Q(21,LOW); B(22,LOW); Q(23,LOW); B(24,LOW); Q(22,HIGH);
B(77,LOW); B(78,LOW); B(79,LOW);
for(let c=80;c<=87;c++) B(c,HIGH);
B(91,HIGH); B(92,HIGH); Q(93,HIGH); B(94,LOW);
Q(100,LOW); Q(103,LOW); Q(106,LOW); Q(103,HIGH);
B(118,LOW);
B(121,HIGH); B(122,HIGH); B(123,HIGH);
B(128,HIGH); Q(129,HIGH); Q(130,HIGH); B(131,HIGH); B(129,LOW); B(130,LOW);
// pyramids
function stair(c0, dir, hMax){ // dir 1 ascending, -1 descending
  for(let i=0;i<hMax;i++){
    const c = c0 + i;
    const h = dir===1 ? i+1 : hMax-i;
    for(let k=0;k<h;k++) grid[GROUND_ROW-1-k][c]=5;
  }
}
stair(134,1,4); stair(139,-1,4);
stair(148,1,4); for(let k=0;k<4;k++) grid[GROUND_ROW-1-k][152]=5;
for(let k=0;k<4;k++) grid[GROUND_ROW-1-k][155]=5; stair(156,-1,4);
// final big stair
for(let i=0;i<8;i++){ const c=181+i,h=i+1; for(let k=0;k<h;k++) grid[GROUND_ROW-1-k][c]=5; }
for(let k=0;k<8;k++) grid[GROUND_ROW-1-k][189]=5;

// pipes: [col, height(tiles)]
const pipes = [[28,2],[38,3],[46,4],[57,4],[163,2],[179,2]];
for (const [c,h] of pipes)
  for (let k=0;k<h;k++){ grid[GROUND_ROW-1-k][c]=6; grid[GROUND_ROW-1-k][c+1]=6; }

// floating coins
const coins = [];
function coinAt(c, r){ coins.push({x:c*T+T/2, y:r*T+T/2, taken:false, t:Math.random()*6}); }
[[60,8],[61,7],[62,7],[63,8],
 [86,8],[87,8],[88,8],
 [110,8],[111,8],[112,8],[113,8],

/* ---------- physics helpers ---------- */
function solidAt(c, r) {
  if (c < 0 || c >= LEVEL_W) return true;
  if (r < 0) return false;
  if (r >= ROWS) return false;
  return grid[r][c] !== 0;
}
function groundProbe(e) {
  const c0 = Math.floor(e.x/T), c1 = Math.floor((e.x+e.w-1)/T);
  const r = Math.floor((e.y+e.h+2)/T);
  for (let c=c0;c<=c1;c++) if (solidAt(c,r)) return true;
  return false;
}
function rectVsGrid(e) {
  // horizontal
  e.x += e.vx;
  let c0 = Math.floor(e.x/T), c1 = Math.floor((e.x+e.w-1)/T);
  let r0 = Math.floor(e.y/T), r1 = Math.floor((e.y+e.h-1)/T);
  if (e.vx > 0) {
    for (let r=r0;r<=r1;r++) if (solidAt(c1,r)) { e.x = c1*T - e.w; e.vx = 0; break; }
  } else if (e.vx < 0) {
    for (let r=r0;r<=r1;r++) if (solidAt(c0,r)) { e.x = (c0+1)*T; e.vx = 0; break; }
  }
  // vertical
  e.y += e.vy;
  c0 = Math.floor(e.x/T); c1 = Math.floor((e.x+e.w-1)/T);
  r0 = Math.floor(e.y/T); r1 = Math.floor((e.y+e.h-1)/T);
  if (e.vy > 0) {
    for (let c=c0;c<=c1;c++) if (solidAt(c,r1)) { e.y = r1*T - e.h; e.vy = 0; break; }
  } else if (e.vy < 0) {
    for (let c=c0;c<=c1;c++) if (solidAt(c,r0)) {
      e.y = (r0+1)*T; e.vy = 0;
      if (e === player) hitBlock(c, r0);
      break;
    }
  }
  // grounded = not moving upward AND solid within 2px below the feet
  e.onGround = e.vy >= 0 && groundProbe(e);
}
function hitBlock(c, r) {
  // pick the block most overlapping player center
  const pc = Math.floor((player.x+player.w/2)/T);
  let cc = solidAt(pc, r) && (grid[r][pc]===2||grid[r][pc]===3) ? pc : c;
  const v = grid[r][cc];
  if (v === 3) {
    grid[r][cc] = 4;
    bumps.push({c:cc,r,t:0});
    if (qContent[r*LEVEL_W+cc] === "flower") {
      flowers.push({x:cc*T+T/2, y:r*T+4, rise:0, taken:false});
      sfx.coin();
    } else if (qContent[r*LEVEL_W+cc] === "food") {
      foods.push({x:cc*T+T/2, y:r*T+4, rise:0, taken:false});
      sfx.coin();
    } else {
      popCoins.push({x:cc*T+T/2, y:r*T, vy:-7, t:0});
      score += 200; coinCount++;
      floatTexts.push({x:cc*T+T/2, y:r*T-6, txt:"200", t:0});
      sfx.coin();
    }
  } else if (v === 2) {
    bumps.push({c:cc,r,t:0});
    sfx.bump();
  } else sfx.bump();
}

/* ---------- update ---------- */
function respawn() {
  player.x = 3*T; player.y = GROUND_ROW*T-58; player.vx = 0; player.vy = 0;
  camX = 0; history.length = 0;
  dog.x = player.x-60; dog.y = player.y;
  resetEnemies();
  state = "play";
}
let jumpHeld = false;
function update() {
  frame++;
  if (state === "title") { if (started) { state = "play"; } return; }

  if (state === "play") {
    timeLeft -= 1/30;
    // --- player control
    const acc = 0.45, maxV = 4.4, fric = 0.82;
    const cheering = player.cheerT > 0;
    if (cheering) { player.cheerT--; player.vx *= 0.7; }
    if (!cheering && left())  { player.vx = Math.max(player.vx-acc, -maxV); player.facing = -1; }
    else if (!cheering && right()) { player.vx = Math.min(player.vx+acc, maxV); player.facing = 1; }
    else player.vx *= fric;
    if (Math.abs(player.vx) < 0.05) player.vx = 0;
    if (!cheering && jumpK() && player.onGround && !jumpHeld) { player.vy = -13.2; jumpHeld = true; sfx.jump(); }
    if (!jumpK()) jumpHeld = false;
    if (!jumpK() && player.vy < -5) player.vy = -5;   // variable jump height
    player.vy = Math.min(player.vy + 0.62, 14);
    if (player.x < camX+2) player.x = camX+2, player.vx = Math.max(0, player.vx);
    rectVsGrid(player);
    player.animT += Math.abs(player.vx) * 0.0145;  // phase 0..1 per walk cycle

    // trail for the dog
    history.push({x:player.x, y:player.y, g:player.onGround});
    if (history.length > 26) history.shift();
    const past = history[0];
    const targetX = past.x + (player.facing===1 ? -46 : 46);
    const dist = Math.abs(targetX - dog.x);
    if (dist > 9) dog.moving = true; else if (dist < 2.5) dog.moving = false;
    const dogDx = (targetX - dog.x) * 0.18;
    dog.x += dogDx;
    dog.animT += Math.abs(dogDx) * 0.016;
    dog.y += (past.y + 14 - dog.y) * 0.3;
    dog.airborne = !past.g;
    if (dog.moving) dog.facing = targetX > dog.x ? 1 : -1;

    // flowers
    for (const f of flowers) {
      if (f.taken) continue;
      if (f.rise < 30) { f.rise++; f.y -= 1.1; }
      if (Math.abs(player.x+player.w/2 - f.x) < 26 && Math.abs(player.y+player.h/2 - f.y) < 40) {
        f.taken = true; score += 1000;
        player.cheerT = 85;
        floatTexts.push({x:f.x, y:f.y-12, txt:"小花 +1000", t:0});
        sfx.fanfare();
      }
    }
    // dog food
    for (const f of foods) {
      if (f.taken) continue;
      if (f.rise < 30) { f.rise++; f.y -= 1.1; }
      if (Math.abs(player.x+player.w/2 - f.x) < 26 && Math.abs(player.y+player.h/2 - f.y) < 40) {
        f.taken = true; dogFed = true; poopTimer = 0; score += 500;
        floatTexts.push({x:f.x, y:f.y-12, txt:"荳荳吃到飼料！ +500", t:0});
        sfx.fanfare();
      }
    }
    // fed dog drops a poop every 3 seconds until the flag is grabbed
    if (dogFed && !flag.grabbed) {
      poopTimer++;
      if (poopTimer >= 180 && !dog.airborne) {
        poopTimer = 0;
        const gy = groundYUnder({x:dog.x, w:30, h:0});
        if (gy < H) poops.push({x:dog.x+15, y:gy, t:0});
      }
    }
    for (const p of poops) p.t++;
    // coins
    for (const c of coins) {
      c.t += 0.1;
      if (!c.taken && Math.abs(player.x+player.w/2-c.x)<22 && Math.abs(player.y+player.h/2-c.y)<34) {
        c.taken = true; coinCount++; score += 100; sfx.coin();
        floatTexts.push({x:c.x, y:c.y-10, txt:"100", t:0});
      }
    }
    // enemies
    for (const e of enemies) {
      if (!e.alive) { e.squash += 1; continue; }
      if (Math.abs(e.x - (camX+W/2)) > W) continue;  // sleep offscreen
      e.t += 0.15;
      e.vy = (e.vy||0) + 0.62;
      const ahead = e.vx<0 ? Math.floor((e.x-1)/T) : Math.floor((e.x+e.w+1)/T);
      const footR = Math.floor((e.y+e.h+2)/T);
      if (solidAt(ahead, Math.floor((e.y+e.h-2)/T)) || !solidAt(ahead, footR)) e.vx *= -1;
      rectVsGrid(e);
      // poop is lethal to critters
      for (const p of poops) {
        if (e.x < p.x+12 && e.x+e.w > p.x-12 && e.y+e.h > p.y-18 && e.y < p.y) {
          e.alive = false; score += 100; sfx.stomp();
          floatTexts.push({x:e.x+e.w/2, y:e.y-8, txt:"💩 100", t:0});
          break;
        }
      }
      if (!e.alive) continue;
      // collide with player
      if (player.x < e.x+e.w && player.x+player.w > e.x && player.y < e.y+e.h && player.y+player.h > e.y) {
        if (player.vy > 0 && player.y+player.h - e.y < 18) {
          e.alive = false; player.vy = -8; score += 100; sfx.stomp();
          floatTexts.push({x:e.x+e.w/2, y:e.y-8, txt:"100", t:0});
        } else { die(); return; }
      }
    }
    // fall into pit / time up
    if (player.y > H + 60 || timeLeft <= 0) { die(); return; }

    // flag grab
    if (!flag.grabbed && player.x + player.w > flag.x - 22 && player.x < flag.x + 40) {
      flag.grabbed = true; state = "flag"; stateT = 0;
      score = 520520;
      player.vx = 0; player.vy = 0;
      player.x = flag.x - player.w - 2;
      sfx.fanfare();
    }
  }

  else if (state === "dying") {
    stateT++;
    player.vy += 0.5; player.y += player.vy;
    if (stateT > 110) {
      if (lives <= 0) { lives = 3; score = 0; coinCount = 0; }
      timeLeft = 300;
      respawn();
    }
  }

  else if (state === "flag") {
    stateT++;
    flag.slideY = Math.min(flag.slideY + 4, flag.baseY - 40);
    if (player.y + player.h < GROUND_ROW*T) player.y += 4;
    else { player.y = GROUND_ROW*T - player.h; if (stateT > 55) { state = "walkoff"; stateT = 0; } }
    dogFollowSimple();
  }

  else if (state === "walkoff") {
    stateT++;
    player.facing = 1;
    const targetX = man.x - 86;
    if (player.x < targetX) { player.x += 2.6; player.animT += 0.04; player.y = groundYUnder(player); }
    else if (Math.abs(dog.x - (player.x-50)) < 14 || stateT > 320) {
      state = "party"; stateT = 0; sfx.fanfare();
      man.state = "cheer";
      showRetry();
    }
    dogFollowSimple();
    if (man.x > 205.4*T) { man.x -= 1.2; man.dir = -1; man.animT += 0.013; man.state="walk"; } else man.state="stand";
  }

  else if (state === "party") {
    stateT++;
    updateFireworks();
  }

  // man pacing (during normal play)
  if (state === "play" || state === "flag") {
    man.t++;
    if (man.state === "walk") {
      man.x += man.dir * 1.0;
      man.animT += 0.013;
      if (man.x < man.minX) { man.x = man.minX; man.state = "stand"; man.t = 0; man.dir = 1; }
      if (man.x > man.maxX) { man.x = man.maxX; man.state = "stand"; man.t = 0; man.dir = -1; }
      if (man.t > 260 && Math.random() < 0.01) { man.state = "stand"; man.t = 0; }
    } else if (man.state === "stand") {
      if (man.t > 90 + Math.random()*60) { man.state = "walk"; man.t = 0; }
    }
  }

  // shared anims
  for (let i=bumps.length-1;i>=0;i--) { bumps[i].t++; if (bumps[i].t>16) bumps.splice(i,1); }
  for (let i=popCoins.length-1;i>=0;i--) { const p=popCoins[i]; p.t++; p.y+=p.vy; p.vy+=0.5; if (p.t>26) popCoins.splice(i,1); }
  for (let i=floatTexts.length-1;i>=0;i--) { const f=floatTexts[i]; f.t++; f.y-=0.7; if (f.t>50) floatTexts.splice(i,1); }

  // camera
  if (state === "play" || state === "flag" || state === "walkoff") {
    const target = state==="play" ? player.x - W*0.38 : Math.min(player.x - W*0.38, LEVEL_W*T - W);
    camX = Math.max(camX, Math.min(target, LEVEL_W*T - W));
  } else if (state === "party") {
    camX += ((LEVEL_W*T - W) - camX) * 0.04;
  }
}
function dogFollowSimple() {
  const targetX = player.x - 50;
  const dist = Math.abs(targetX - dog.x);
  if (dist > 10) dog.moving = true; else if (dist < 3) dog.moving = false;
  const dogDx = (targetX - dog.x) * 0.1;
  dog.x += dogDx;
  dog.animT += Math.abs(dogDx) * 0.016;
  dog.y += (groundYUnder({x:dog.x,w:30,h:44}) + 12 - dog.y) * 0.25;
  if (dog.moving) dog.facing = targetX > dog.x ? 1 : -1;
}
function groundYUnder(e) {
  const c = Math.floor((e.x+e.w/2)/T);
  for (let r=0;r<ROWS;r++) if (solidAt(c,r)) return r*T - e.h;
  return GROUND_ROW*T - e.h;
}
function die() {
  if (state !== "play") return;
  lives--; state = "dying"; stateT = 0; player.vy = -10; sfx.die();
}

/* ---------- fireworks ---------- */
const FW_CHARS = ["生","日","快","樂"];
const charPoints = FW_CHARS.map(ch => {
  const oc = document.createElement("canvas"); oc.width = 160; oc.height = 160;
  const o = oc.getContext("2d");
  o.font = "bold 140px 'Microsoft JhengHei','PingFang TC',sans-serif";
  o.textAlign = "center"; o.textBaseline = "middle";
  o.fillText(ch, 80, 88);
  const d = o.getImageData(0,0,160,160).data;
  const pts = [];
  for (let y=0;y<160;y+=5) for (let x=0;x<160;x+=5)
    if (d[(y*160+x)*4+3] > 120) pts.push({x:(x-80)*1.1, y:(y-80)*1.1});
  return pts;
});
const rockets = [], particles = [];
let fwTimer = 0, fwIndex = 0;
const FW_COLORS = ["#ff5e5e","#ffd45e","#7dff8a","#6fc8ff","#d98bff","#ff9ce0"];
function updateFireworks() {
  fwTimer++;
  // launch text rockets: 4 chars across the sky, then loop with random ones between
  if (fwIndex < 4 && fwTimer > 30 + fwIndex*55) {
    const cx = W*0.2 + fwIndex*W*0.2;
    rockets.push({sx:camX+cx, sy:H-40, x:camX+cx, y:H-40, ty:110 + (fwIndex%2)*26, vy:-7.5,
      char:fwIndex, color:FW_COLORS[fwIndex+1]});
    fwIndex++;
  }
  if (fwIndex >= 4 && fwTimer % 46 === 0) {
    const r = {sx:camX+W*(0.1+Math.random()*0.8), sy:H-40, ty:80+Math.random()*150, vy:-8, char:-1, color:FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)]};
    r.x = r.sx; r.y = r.sy;
    rockets.push(r);
  }
  for (let i=rockets.length-1;i>=0;i--) {
    const r = rockets[i];
    r.y += r.vy;
    particles.push({x:r.x+(Math.random()-0.5)*3, y:r.y+8, vx:0, vy:1, life:14, max:14, c:"#ffe9b0", size:2, mode:"trail"});
    if (r.y <= r.ty) {
      explode(r); rockets.splice(i,1); sfx.boom();
    }
  }
  for (let i=particles.length-1;i>=0;i--) {
    const p = particles[i];
    p.life--;
    if (p.mode === "char") {
      p.x += (p.tx-p.x)*0.10; p.y += (p.ty-p.y)*0.10 + 0.05;
    } else {
      p.x += p.vx; p.y += p.vy; p.vx *= 0.985; p.vy = p.vy*0.985 + 0.045;
    }
    if (p.life <= 0) particles.splice(i,1);
  }
}
function explode(r) {
  if (r.char >= 0) {
    const pts = charPoints[r.char];
    for (const q of pts) particles.push({
      x:r.x, y:r.y, tx:r.x+q.x, ty:r.y+q.y,
      life:210+Math.random()*40, max:240, c:r.color, size:2.6, mode:"char"
    });
  } else {
    const n = 70;
    for (let i=0;i<n;i++) {
      const a = (i/n)*Math.PI*2, sp = 2.2+Math.random()*2.6;
      particles.push({x:r.x, y:r.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
        life:60+Math.random()*40, max:100, c:r.color, size:2.2, mode:"ball"});
    }
  }
}

/* ---------- drawing ---------- */
function drawSprite(set, idx, cx, bottomY, hgt, flip) {
  const arr = IMGS[set]; if (!arr) return;
  const im = arr[Math.floor(idx) % arr.length];
  if (!im.complete || !im.naturalWidth) return;
  const w = Math.round(im.width * (hgt/im.height));
  const px = Math.round(cx), py = Math.round(bottomY);
  ctx.save();
  if (flip) { ctx.translate(px,0); ctx.scale(-1,1); ctx.translate(-px,0); }
  ctx.drawImage(im, px - (w>>1), py - hgt, w, hgt);
  ctx.restore();
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function drawBG() {
  // night sky during party
  if (state === "party") {
    const g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,"#0b1035"); g.addColorStop(1,"#27306b");
    ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "rgba(255,255,255,.8)";
    for (let i=0;i<60;i++){ const x=(i*173+((i*89)%37)*9)%W, y=(i*97)%(H*0.6);
      ctx.globalAlpha = 0.3+0.7*Math.abs(Math.sin(frame*0.02+i)); ctx.fillRect(x,y,2,2); }
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = "#5c94fc"; ctx.fillRect(0,0,W,H);
  }
  // hills & bushes & clouds (parallax-ish, tiled)
  const cx = camX;
  ctx.fillStyle = state==="party" ? "#1c4a2e" : "#3ca33c";
  for (let i=0;i<8;i++) {
    const hx = (i*520) - (cx*0.6 % 520) - 260;
    ctx.beginPath(); ctx.moveTo(hx, GROUND_ROW*T);
    ctx.quadraticCurveTo(hx+90, GROUND_ROW*T-130, hx+180, GROUND_ROW*T);
    ctx.fill();
    const hx2 = hx + 300;
    ctx.beginPath(); ctx.moveTo(hx2, GROUND_ROW*T);
    ctx.quadraticCurveTo(hx2+60, GROUND_ROW*T-78, hx2+120, GROUND_ROW*T);
    ctx.fill();
  }
  ctx.fillStyle = state==="party" ? "rgba(255,255,255,.18)" : "#ffffff";
  for (let i=0;i<7;i++) {
    const cxx = (i*470) - (cx*0.35 % 470) - 200, cy = 50 + (i%3)*36;
    for (const [ox,oy,r] of [[0,0,22],[20,-8,26],[44,0,22]]) {
      ctx.beginPath(); ctx.arc(cxx+ox, cy+oy, r, 0, 7); ctx.fill();
    }
  }
}
function drawTiles() {
  const c0 = Math.max(0, Math.floor(camX/T)-1), c1 = Math.min(LEVEL_W-1, Math.ceil((camX+W)/T)+1);
  for (let r=0;r<ROWS;r++) for (let c=c0;c<=c1;c++) {
    const v = grid[r][c]; if (!v || v===6) continue;
    let x = c*T - camX, y = r*T;
    for (const b of bumps) if (b.c===c && b.r===r) y -= Math.sin(b.t/16*Math.PI)*9;
    if (v===1) { // ground
      ctx.fillStyle = "#c84c0c"; ctx.fillRect(x,y,T,T);
      ctx.fillStyle = "#e39d5a";
      ctx.fillRect(x+1,y+1,T-2,3); ctx.fillRect(x+1,y+1,3,T-2);
      ctx.fillStyle = "#7c2a06";
      ctx.fillRect(x, y+T-3, T, 3); ctx.fillRect(x+T-3, y, 3, T);
      ctx.fillRect(x+T/2-1, y+4, 2, T-8);
    } else if (v===2) { // brick
      ctx.fillStyle = "#c84c0c"; ctx.fillRect(x,y,T,T);
      ctx.strokeStyle = "#5e2104"; ctx.lineWidth = 2;
      ctx.strokeRect(x+1,y+1,T-2,T-2);
      ctx.beginPath();
      ctx.moveTo(x,y+T/2); ctx.lineTo(x+T,y+T/2);
      ctx.moveTo(x+T/2,y); ctx.lineTo(x+T/2,y+T/2);
      ctx.moveTo(x+T/4,y+T/2); ctx.lineTo(x+T/4,y+T);
      ctx.moveTo(x+3*T/4,y+T/2); ctx.lineTo(x+3*T/4,y+T);
      ctx.stroke();
    } else if (v===3) { // ? block
      ctx.fillStyle = "#f8a000"; ctx.fillRect(x,y,T,T);
      ctx.fillStyle = "#ffd24d"; ctx.fillRect(x+2,y+2,T-4,4);
      ctx.fillStyle = "#9c5a00"; ctx.fillRect(x,y+T-4,T,4);
      ctx.fillStyle = "#fff";
      ctx.font = "bold 20px monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
      const bob = Math.sin(frame*0.1 + c)*1.5;
      ctx.fillText("?", x+T/2, y+T/2+1+bob*0);
      ctx.fillStyle="#5e2104"; [[3,3],[T-6,3],[3,T-7],[T-6,T-7]].forEach(([ox,oy])=>ctx.fillRect(x+ox,y+oy,3,3));
    } else if (v===4) { // used
      ctx.fillStyle = "#8a5a2a"; ctx.fillRect(x,y,T,T);
      ctx.fillStyle = "#5e3a16"; ctx.fillRect(x,y+T-4,T,4);
      ctx.strokeStyle = "#5e3a16"; ctx.strokeRect(x+1,y+1,T-2,T-2);
    } else if (v===5) { // stair block
      ctx.fillStyle = "#b8743a"; ctx.fillRect(x,y,T,T);
      ctx.fillStyle = "#e0a86a"; ctx.fillRect(x+1,y+1,T-2,4); ctx.fillRect(x+1,y+1,4,T-2);
      ctx.fillStyle = "#6e3c12"; ctx.fillRect(x,y+T-3,T,3); ctx.fillRect(x+T-3,y,3,T);
    }
  }
  // pipes
  for (const [c,h] of pipes) {
    const x = c*T - camX, top = (GROUND_ROW-h)*T;
    if (x < -3*T || x > W+T) continue;
    ctx.fillStyle = "#2e9e2e";
    ctx.fillRect(x+3, top+14, 2*T-6, h*T-14);
    roundRect(x-2, top, 2*T+4, 18, 4); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.35)";
    ctx.fillRect(x+8, top+3, 7, 12); ctx.fillRect(x+9, top+18, 6, h*T-22);
    ctx.fillStyle = "rgba(0,0,0,.25)";
    ctx.fillRect(x+2*T-10, top+3, 6, 12); ctx.fillRect(x+2*T-9, top+18, 5, h*T-22);
  }
}
function drawCoin(x, y, t, sc=1) {
  const ph = Math.abs(Math.sin(t));
  ctx.fillStyle = "#ffd24d";
  ctx.beginPath(); ctx.ellipse(x, y, 7*sc*Math.max(0.25,ph), 9*sc, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = "#b07800"; ctx.lineWidth = 2; ctx.stroke();
}
function drawFlower(f) {
  const x = Math.round(f.x - camX), y = Math.round(f.y);
  if (x < -40 || x > W+40) return;
  const sway = Math.sin(frame*0.08 + f.x)*1.5;
  ctx.strokeStyle = "#2e9e2e"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x, y+14); ctx.quadraticCurveTo(x+sway, y+4, x+sway, y-4); ctx.stroke();
  ctx.fillStyle = "#2e9e2e";
  ctx.beginPath(); ctx.ellipse(x-6, y+9, 6, 3, -0.6, 0, 7); ctx.fill();
  for (let i=0;i<6;i++) {
    const a = i/6*Math.PI*2 + frame*0.01;
    ctx.fillStyle = "#ff8ac2";
    ctx.beginPath(); ctx.ellipse(x+sway+Math.cos(a)*8, y-8+Math.sin(a)*8, 6, 6, 0, 0, 7); ctx.fill();
  }
  ctx.fillStyle = "#ffd24d";
  ctx.beginPath(); ctx.arc(x+sway, y-8, 5.5, 0, 7); ctx.fill();
}
function drawFood(f) {
  const x = Math.round(f.x - camX), y = Math.round(f.y);
  if (x < -40 || x > W+40) return;
  const bob = Math.sin(frame*0.08 + f.x)*1.5;
  ctx.save(); ctx.translate(x, y-6+bob); ctx.rotate(-0.35);
  ctx.fillStyle = "#fff6e0"; ctx.strokeStyle = "#c9a86a"; ctx.lineWidth = 2;
  roundRect(-10, -3.5, 20, 7, 3.5); ctx.fill(); ctx.stroke();
  for (const [ox,oy] of [[-10,-4],[-10,4],[10,-4],[10,4]]) {
    ctx.beginPath(); ctx.arc(ox, oy, 5, 0, 7); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}
function drawPoop(p) {
  const x = Math.round(p.x - camX), y = Math.round(p.y);
  if (x < -30 || x > W+30) return;
  const pop = Math.min(1, p.t/10);
  ctx.save(); ctx.translate(x, y); ctx.scale(pop, pop);
  ctx.fillStyle = "#8a5a2a";
  ctx.beginPath(); ctx.ellipse(0, -4, 11, 5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -10, 8, 4.5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -15, 5, 3.5, 0, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(1, -18, 2.2, 0, 7); ctx.fill();
  ctx.fillStyle = "rgba(255,255,255,.35)";
  ctx.beginPath(); ctx.arc(-4, -11, 1.6, 0, 7); ctx.arc(-5, -5, 1.8, 0, 7); ctx.fill();
  ctx.restore();
}
function drawFlag() {
  const x = flag.x - camX;
  ctx.fillStyle = "#9adb9a";
  ctx.fillRect(x-2, flag.topY, 4, flag.baseY - flag.topY - T);
  ctx.beginPath(); ctx.arc(x, flag.topY, 7, 0, 7); ctx.fillStyle = "#ffd24d"; ctx.fill();
  ctx.strokeStyle="#7c5a00"; ctx.stroke();
  const fy = flag.grabbed ? flag.slideY : flag.topY + 12;
  ctx.fillStyle = "#2e9e2e";
  ctx.beginPath(); ctx.moveTo(x-2, fy); ctx.lineTo(x-30, fy+11); ctx.lineTo(x-2, fy+22); ctx.fill();
}
function drawCastle() {
  const x = CASTLE_X - camX, gy = GROUND_ROW*T;
  if (x > W+300 || x < -300) return;
  ctx.fillStyle = "#b8743a";
  ctx.fillRect(x, gy-96, 160, 96);
  ctx.fillRect(x+32, gy-150, 96, 60);
  ctx.fillStyle = "#8a4a1a";
  for (let i=0;i<5;i++) ctx.fillRect(x+i*34, gy-110, 22, 14);
  for (let i=0;i<3;i++) ctx.fillRect(x+38+i*34, gy-164, 22, 14);
  ctx.fillStyle = "#3a1c08";
  roundRect(x+62, gy-52, 36, 52, 16); ctx.fill();
  ctx.fillRect(x+44, gy-130, 14, 18); ctx.fillRect(x+102, gy-130, 14, 18);
  // banner
  ctx.fillStyle = "#fff"; ctx.fillRect(x+78, gy-196, 3, 34);
  ctx.fillStyle = "#e84a4a";
  ctx.beginPath(); ctx.moveTo(x+81,gy-196); ctx.lineTo(x+108,gy-188); ctx.lineTo(x+81,gy-180); ctx.fill();
}
function drawEnemy(e) {
  const x = e.x - camX;
  if (x < -60 || x > W+60) return;
  if (!e.alive) {
    if (e.squash > 24) return;
    ctx.fillStyle = "#8a5a2a";
    ctx.beginPath(); ctx.ellipse(x+e.w/2, e.y+e.h-4, 15, 5, 0, 0, 7); ctx.fill();
    return;
  }
  const cx = x+e.w/2, cy = e.y+e.h/2+2;
  ctx.fillStyle = "#9c6a32";
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, 7); ctx.fill();
  ctx.fillStyle = "#6e4418";
  for (let i=0;i<7;i++){ const a=Math.PI+ (i/6)*Math.PI;
    ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*12, cy+Math.sin(a)*12);
    ctx.lineTo(cx+Math.cos(a)*19, cy+Math.sin(a)*19);
    ctx.lineWidth=3; ctx.strokeStyle="#6e4418"; ctx.stroke(); }
  const st = Math.sin(e.t)>0?2:-2;
  ctx.fillStyle="#6e4418";
  ctx.beginPath(); ctx.ellipse(cx-7+st, e.y+e.h-2, 5,3,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+7-st, e.y+e.h-2, 5,3,0,0,7); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(cx-5, cy-1, 4, 0, 7); ctx.arc(cx+5, cy-1, 4, 0, 7); ctx.fill();
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.arc(cx-4+e.vx*2, cy-1, 2, 0, 7); ctx.arc(cx+6+e.vx*2, cy-1, 2, 0, 7); ctx.fill();
}
function drawCharacters() {
  // dog
  {
    const x = dog.x + 15 - camX, by = dog.y + 44;
    let set = "dog_idle", idx = 0, flip = false;
    if (state === "party") {
      const hop = Math.abs(Math.sin(stateT*0.12))*16;
      drawSprite(Math.floor(stateT*0.12)%2 ? "dog_jump":"dog_idle", 0, x, by-hop, 46, false);
    } else {
      if (player.cheerT > 0 && state === "play") {
        const hop = Math.abs(Math.sin(player.cheerT*0.15))*12;
        drawSprite(Math.floor(player.cheerT*0.15)%2 ? "dog_jump":"dog_idle", 0, x, by-hop, 46, false);
      } else {
        if (dog.airborne) { set = "dog_jump"; flip = dog.facing===-1; }
        else if (dog.moving) { set = dog.facing===1?"dog_right":"dog_left"; idx = dog.animT * IMGS[set].length; }
        drawSprite(set, idx, x, by, 46, flip);
      }
    }
  }
  // player
  {
    const x = player.x + player.w/2 - camX, by = player.y + player.h + 2;
    if (state === "dying") {
      drawSprite("croc_idle", 0, x, by, 62, false);
    } else if (state === "party") {
      const j = Math.floor(stateT*0.1)%2;
      const hop = j ? 10 : 0;
      drawSprite("croc_cheer", j, x, by - hop, 64, false);
    } else if (state === "flag") {
      drawSprite("croc_jump", 0, flag.x - camX - 12, by, 62, true);
    } else if (player.cheerT > 0 && player.onGround) {
      const j = Math.floor(player.cheerT*0.12)%2;
      drawSprite("croc_cheer", j, x, by - (j?8:0), 64, false);
    } else if (!player.onGround) {
      drawSprite("croc_jump", 0, x, by, 62, player.facing===-1);
    } else if (Math.abs(player.vx) > 0.15 || left() || right() || state === "walkoff") {
      const set = player.facing===1?"croc_right":"croc_left";
      drawSprite(set, player.animT * IMGS[set].length, x, by, 62, false);
    } else {
      drawSprite("croc_idle", 0, x, by, 62, false);
    }
  }
  // man
  {
    const x = man.x - camX, by = GROUND_ROW*T;
    if (x > -80 && x < W+80) {
      if (state === "party") {
        const j = Math.floor(stateT*0.1)%2;
        drawSprite(j?"man_cheer":"man_stand", 0, x, by - (j?8:0), 60, false);
      } else if (man.state === "walk") {
        drawSprite("man_walk", man.animT * IMGS["man_walk"].length, x, by, 60, man.dir===-1);
      } else {
        drawSprite("man_stand", 0, x, by, 60, man.dir===-1);
      }
    }
  }
}
function drawFireworks() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const r of rockets) {
    ctx.fillStyle = "#ffe9b0";
    ctx.fillRect(r.x-camX-1.5, r.y, 3, 10);
  }
  for (const p of particles) {
    const a = Math.max(0, Math.min(1, p.life/p.max * 1.6));
    ctx.globalAlpha = p.mode==="char" && p.life>40 ? 0.8+0.2*Math.sin(p.life*0.3) : a;
    ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x-camX, p.y, p.size, 0, 7); ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}
function drawHUD() {
  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.fillRect(0,0,W,34);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 15px 'Microsoft JhengHei',sans-serif";
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  ctx.fillText(`分數 ${String(score).padStart(6,"0")}`, 16, 18);
  drawCoin(190, 17, 1.2, 0.8);
  ctx.fillText(`× ${coinCount}`, 204, 18);
  ctx.fillText(`世界 8-6`, 300, 18);
  ctx.fillText(`時間 ${Math.max(0,Math.ceil(timeLeft))}`, 420, 18);
  ctx.fillText(`❤ × ${lives}`, 540, 18);
  for (const f of floatTexts) {
    ctx.globalAlpha = 1 - f.t/50;
    ctx.fillStyle = "#fff"; ctx.font = "bold 13px monospace"; ctx.textAlign="center";
    ctx.fillText(f.txt, f.x-camX, f.y);
    ctx.globalAlpha = 1;
  }
}
function drawTitle() {
  ctx.fillStyle = "rgba(0,0,0,.55)"; ctx.fillRect(0,0,W,H);
  ctx.textAlign = "center"; ctx.fillStyle = "#ffd24d";
  ctx.font = "bold 44px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("小鱷大冒險", W/2, H/2 - 80);
  ctx.fillStyle = "#fff"; ctx.font = "bold 20px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("世界 8-6", W/2, H/2 - 40);
  ctx.font = "16px 'Microsoft JhengHei',sans-serif";
  ctx.fillText("← → 或 A D：移動      空白鍵 / ↑ / W：跳躍", W/2, H/2 + 14);
  ctx.fillText("荳荳會跟著你一起冒險，抵達終點旗幟吧！", W/2, H/2 + 44);
  if (imgsLoaded < imgsToLoad) {
    ctx.fillStyle = "#9adb9a"; ctx.fillText(`載入中… ${imgsLoaded}/${imgsToLoad}`, W/2, H/2 + 92);
  } else {
    ctx.fillStyle = "#9adb9a";
    ctx.globalAlpha = 0.6 + 0.4*Math.sin(frame*0.1);
    ctx.fillText("按任意鍵或點擊畫面開始", W/2, H/2 + 92);
    ctx.globalAlpha = 1;
  }
}
function drawPartyBanner() {
  if (stateT < 60) return;
  const a = Math.min(1, (stateT-60)/40);
  ctx.save();
  ctx.globalAlpha = a;
  ctx.textAlign = "center";
  ctx.font = "bold 30px 'Microsoft JhengHei',sans-serif";
  ctx.fillStyle = "rgba(0,0,0,.4)";
  roundRect(W/2-220, H-78, 440, 48, 12); ctx.fill();
  ctx.fillStyle = "#ffd24d";
  ctx.fillText("🎉 生日快樂！ 🎂", W/2, H-53);
  ctx.restore();
}

/* ---------- main loop ---------- */
function render() {
  const camSave = camX; camX = Math.round(camX);
  drawBG();
  drawTiles();
  for (const c of coins) if (!c.taken) drawCoin(c.x-camX, c.y + Math.sin(c.t)*2, c.t);
  for (const p of popCoins) drawCoin(p.x-camX, p.y, p.t*0.3);
  for (const f of flowers) if (!f.taken) drawFlower(f);
  for (const f of foods) if (!f.taken) drawFood(f);
  for (const p of poops) drawPoop(p);
  drawFlag();
  drawCastle();
  for (const e of enemies) drawEnemy(e);
  drawCharacters();
  if (state === "party") { drawFireworks(); drawPartyBanner(); }
  drawHUD();
  if (state === "title") drawTitle();
  camX = camSave;
}
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script></body></html>
